<!DOCTYPE html>
<html>
<head>
    <title>Alibaba Token Exchange v2</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f8f9fa; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 2.5rem; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 500px; text-align: center; }
        h1 { color: #333; margin-bottom: 1rem; }
        input { width: 100%; padding: 12px; margin: 1rem 0; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        button { background: #ff6600; color: white; border: none; padding: 14px 28px; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; width: 100%; transition: 0.3s; }
        button:hover { background: #e65c00; transform: translateY(-2px); }
        #output { margin-top: 1.5rem; padding: 1rem; background: #f1f1f1; border-radius: 8px; text-align: left; font-family: monospace; white-space: pre-wrap; display: none; border: 1px solid #ccc; }
        .error { color: #d9534f; background: #f9f2f4; border-color: #d9534f; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Alibaba Final Step</h1>
        <p>Paste the <strong>fresh code</strong> you just got from the address bar below:</p>
        <input type="text" id="code" placeholder="e.g. 3_502296_Q8vX8xN6ihrC...">
        <button onclick="exchange()">Get Final Tokens 💎</button>
        <div id="output"></div>
    </div>

    <script>
        async function exchange() {
            const code = document.getElementById('code').value.trim();
            const out = document.getElementById('output');
            
            if (!code) { alert('Please paste the code first!'); return; }

            out.style.display = 'block';
            out.textContent = '⏱️ Exchanging code...';
            out.className = '';

            const url = 'https://api.alibaba.com/auth/token/create';
            const params = new URLSearchParams({
                grant_type: 'authorization_code',
                code: code,
                client_id: '502296',
                client_secret: 'vwTUfjBmG7MLdyjsZnOC9pfJsy9hGo1V',
                redirect_uri: 'https://example.com/callback'
            });

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    body: params,
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
                });

                const data = await response.json();
                
                if (data.access_token) {
                    out.textContent = '🎉 SUCCESS!\n\nACCESS_TOKEN: ' + data.access_token + '\n\nREFRESH_TOKEN: ' + data.refresh_token;
                    out.style.color = '#28a745';
                } else {
                    out.textContent = '❌ ERROR FROM ALIBABA:\n' + JSON.stringify(data, null, 2);
                    out.className = 'error';
                }
            } catch (err) {
                out.textContent = '❌ NETWORK ERROR:\n' + err.message + '\n\nPossible cause: CORS policy. If this fails, please check the console for details.';
                out.className = 'error';
            }
        }
    </script>
</body>
</html>
